<p-toast></p-toast>

<div class="card">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold m-0">
            <i class="pi pi-list mr-2"></i>
            操作紀錄
        </h2>
        <div class="flex gap-2 items-center">
            <p-select
                [options]="typeOptions"
                [(ngModel)]="selectedType"
                optionLabel="label"
                optionValue="value"
                placeholder="篩選類型"
                (onChange)="onTypeFilter()"
                [style]="{ minWidth: '150px' }"
            ></p-select>
            <p-button icon="pi pi-refresh" label="重新整理" [outlined]="true" (onClick)="loadRecords()"></p-button>
        </div>
    </div>

    <p-table
        [value]="records()"
        [lazy]="true"
        [paginator]="true"
        [rows]="rows"
        [totalRecords]="totalRecords()"
        [loading]="loading()"
        (onLazyLoad)="onPageChange($event)"
        [rowsPerPageOptions]="[10, 15, 25, 50]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="顯示第 {first} 到 {last} 筆，共 {totalRecords} 筆"
    >
        <ng-template #header>
            <tr>
                <th style="width: 80px">ID</th>
                <th style="width: 120px">類型</th>
                <th>詳細內容</th>
                <th style="width: 200px">時間</th>
            </tr>
        </ng-template>
        <ng-template #body let-record>
            <tr>
                <td>{{ record.id }}</td>
                <td>
                    <p-tag [value]="getTypeLabel(record.type)" [severity]="getTypeSeverity(record.type)"></p-tag>
                </td>
                <td>{{ record.detail || '-' }}</td>
                <td>{{ formatDate(record.createdAt) }}</td>
            </tr>
        </ng-template>
        <ng-template #emptymessage>
            <tr>
                <td colspan="4" class="text-center p-8 text-gray-400">
                    <i class="pi pi-inbox" style="font-size: 3rem"></i>
                    <p class="mt-2">尚無操作紀錄</p>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
